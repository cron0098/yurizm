<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YURIZM · Personal Training</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Expanded:wght@600;700;800&family=Archivo:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d0f0e;          /* near-black charcoal */
    --bg2:#15191777;
    --surface:#171b19;     /* card */
    --surface2:#1e2421;    /* raised */
    --line:#2b332e;
    --line2:#384139;
    --ink:#eef2ec;         /* primary text */
    --muted:#8a948b;       /* secondary text */
    --faint:#5b655c;
    --lime:#c6f24a;        /* citrus accent */
    --lime-d:#a6d62f;
    --mine:#c6f24a;        /* user's own booking */
    --booked:#2f6f57;      /* others / scheduled green */
    --booked-ink:#d7f5e8;
    --warn:#ff6a4d;
    --ok:#36c08a;
    --shadow:0 1px 0 rgba(255,255,255,.03), 0 18px 50px rgba(0,0,0,.55);
    --glow:0 0 0 1px rgba(198,242,74,.35), 0 8px 30px rgba(198,242,74,.12);
    --r:16px;
    --disp:"Archivo Expanded","Archivo",sans-serif;
    --body:"Archivo","Noto Sans KR",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    --kr:"Noto Sans KR","Archivo",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(198,242,74,.07), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(47,111,87,.10), transparent 55%),
      var(--bg);
    background-attachment:fixed;
    color:var(--ink);
    font-family:var(--body);
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer}
  input,select{font-family:inherit}

  /* ---------- top bar ---------- */
  .topbar{
    position:sticky;top:0;z-index:50;
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 22px;
    background:rgba(13,15,14,.72);backdrop-filter:blur(14px) saturate(1.2);
    border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:center;gap:12px}
  .brand .mk{
    font-family:var(--disp);
    font-weight:800;letter-spacing:.06em;font-size:23px;line-height:1;
    text-transform:uppercase;
  }
  .brand .mk b{color:var(--lime);font-weight:800}
  .brand .sub{
    font-family:var(--body);
    font-size:10px;color:var(--muted);letter-spacing:.22em;text-transform:uppercase;
    padding-left:12px;border-left:1px solid var(--line2);
  }
  .roleswitch{display:flex;gap:0;border:1px solid var(--line2);border-radius:999px;overflow:hidden;background:var(--surface)}
  .roleswitch button{
    border:0;background:transparent;padding:8px 18px;font-size:12px;font-weight:700;color:var(--muted);
    letter-spacing:.02em;transition:.18s;
  }
  .roleswitch button.on{background:var(--lime);color:#0d0f0e}

  .wrap{max-width:1080px;margin:0 auto;padding:24px 20px 80px}

  /* ---------- gate ---------- */
  .gate{
    max-width:430px;margin:9vh auto 0;background:var(--surface);
    border:1px solid var(--line);border-radius:var(--r);padding:38px 32px;box-shadow:var(--shadow);
    position:relative;overflow:hidden;
  }
  .gate::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--lime),transparent 70%)}
  .gate .eyebrow{font-family:var(--disp);text-transform:uppercase;letter-spacing:.2em;font-size:11px;color:var(--lime);margin-bottom:14px}
  .gate h1{font-family:var(--kr);font-weight:900;font-size:26px;margin:0 0 6px;letter-spacing:-.5px}
  .gate p{color:var(--muted);font-size:14px;margin:0 0 24px;line-height:1.55}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
  .field input,.field select{
    width:100%;padding:13px 14px;border:1px solid var(--line2);border-radius:11px;background:var(--bg);
    font-size:15px;outline:none;color:var(--ink);transition:.18s;color-scheme:dark;
  }
  .field input::placeholder{color:var(--faint)}
  .field input:focus,.field select:focus{border-color:var(--lime);box-shadow:0 0 0 3px rgba(198,242,74,.12)}
  .btn{
    width:100%;padding:14px;border:0;border-radius:11px;background:var(--lime);color:#0d0f0e;
    font-weight:800;font-size:15px;letter-spacing:.01em;transition:.18s;
  }
  .btn:hover{background:var(--lime-d);transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn.accent{background:var(--lime);color:#0d0f0e}
  .btn.accent:hover{background:var(--lime-d)}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line2)}
  .btn.ghost:hover{background:var(--surface2);transform:none}
  .btn.danger{background:var(--warn);color:#1a0a06}
  .btn.danger:hover{filter:brightness(1.08);background:var(--warn)}
  .gate .err{color:var(--warn);font-size:13px;margin-top:10px;min-height:18px}
  .hint{font-size:12px;color:var(--muted);margin-top:20px;line-height:1.7;border-top:1px dashed var(--line2);padding-top:16px}
  .hint code{background:var(--bg);padding:2px 7px;border-radius:6px;border:1px solid var(--line2);color:var(--lime);font-family:var(--body)}

  /* ---------- tabs ---------- */
  .tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
  .tabs button{
    border:1px solid var(--line2);background:var(--surface);padding:10px 18px;border-radius:999px;
    font-size:13px;font-weight:700;color:var(--muted);transition:.18s;
  }
  .tabs button:hover{color:var(--ink);border-color:var(--faint)}
  .tabs button.on{background:var(--lime);color:#0d0f0e;border-color:var(--lime)}

  .panel-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px}
  .panel-head h2{font-family:var(--kr);font-weight:900;font-size:22px;margin:0;letter-spacing:-.4px}
  .panel-head .who{font-size:13px;color:var(--muted)}

  /* ---------- members ---------- */
  .card{background:var(--surface2);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
  .memberform{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:18px}
  .memberform .field{margin:0;flex:1;min-width:140px}
  .memberform .btn{width:auto;padding:12px 20px}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:11px 10px;font-size:14px;border-bottom:1px solid var(--line)}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  td .mini{border:1px solid var(--line2);background:var(--surface2);color:var(--ink);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;margin-right:6px;transition:.18s}
  td .mini:hover{border-color:var(--faint)}
  td .mini.del{color:var(--warn);border-color:rgba(255,106,77,.4)}
  td .mini.del:hover{border-color:var(--warn)}
  .empty{color:var(--muted);font-size:14px;padding:20px;text-align:center}

  /* ---------- calendar ---------- */
  .calbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .calbar .nav{display:flex;gap:6px;align-items:center}
  .calbar .nav button{border:1px solid var(--line2);background:var(--surface);color:var(--ink);min-width:36px;height:36px;padding:0 12px;border-radius:10px;font-size:14px;font-weight:700;white-space:nowrap;line-height:1;transition:.18s}
  .calbar .nav button:hover{border-color:var(--faint)}
  .calbar .label{font-family:var(--disp);font-weight:700;font-size:17px;min-width:170px;text-align:center;letter-spacing:.01em}
  .calbar .spacer{flex:1}
  .seg{display:flex;border:1px solid var(--line2);border-radius:999px;overflow:hidden;background:var(--surface)}
  .seg button{border:0;background:transparent;padding:8px 16px;font-size:12px;font-weight:700;color:var(--muted);transition:.18s}
  .seg button.on{background:var(--lime);color:#0d0f0e}

  .legend{display:flex;gap:16px;flex-wrap:wrap;margin:0 0 14px;font-size:12px;color:var(--muted)}
  .legend i{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:5px;vertical-align:-1px}

  .gridwrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--r);background:var(--surface2);box-shadow:var(--shadow)}
  .wk{min-width:720px;width:100%}
  .wk-head{display:grid;grid-template-columns:64px repeat(7,1fr);border-bottom:1px solid var(--line)}
  .wk-head div{padding:10px 6px;text-align:center;font-size:12px;font-weight:700;color:var(--muted);border-left:1px solid var(--line)}
  .wk-head div:first-child{border-left:0}
  .wk-head .today{color:var(--lime)}
  .wk-row{display:grid;grid-template-columns:64px repeat(7,1fr);border-bottom:1px solid var(--line)}
  .wk-row:last-child{border-bottom:0}
  .wk-time{padding:8px 6px;font-size:11px;color:var(--muted);text-align:right;font-variant-numeric:tabular-nums;border-right:1px solid var(--line);display:flex;align-items:center;justify-content:flex-end}
  .cell{
    border-left:1px solid var(--line);min-height:46px;padding:4px;position:relative;
  }
  .cell:first-of-type{border-left:0}
  .slot{
    position:absolute;inset:3px;border-radius:8px;font-size:11px;font-weight:700;
    display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;line-height:1.25;
    padding:3px;overflow:hidden;
  }
  .slot.open{background:var(--bg);border:1px dashed var(--line2);color:var(--faint);cursor:pointer;transition:.15s}
  .slot.open:hover{border-color:var(--lime);color:var(--lime);background:rgba(198,242,74,.06)}
  .slot.closed{background:repeating-linear-gradient(45deg,transparent,transparent 6px,rgba(255,255,255,.025) 6px,rgba(255,255,255,.025) 12px);color:var(--faint);border:1px solid var(--line)}
  .slot.booked{background:var(--booked);color:var(--booked-ink);cursor:default}
  .slot.tinted{background:var(--c);border:1px solid var(--cb);color:var(--ci);cursor:default}
  .slot.tinted small{opacity:.7}
  .slot.mine{background:var(--mine);color:#0d0f0e}
  .slot.blocked{background:repeating-linear-gradient(45deg,#2a2320,#2a2320 6px,#352b25 6px,#352b25 12px);color:#d9a88f;border:1px solid #4a3a30;cursor:pointer;font-weight:800}
  .snaplabel{font-size:13px;font-weight:700;color:var(--lime);margin:0 0 12px;padding:8px 12px;background:rgba(198,242,74,.08);border:1px solid rgba(198,242,74,.25);border-radius:10px;display:inline-block}
  .slot.past{opacity:.4}
  .slot.dragging{opacity:.5}
  .slot small{font-weight:600;opacity:.8;font-size:10px}
  .cell.dragover{background:rgba(198,242,74,.14);box-shadow:inset 0 0 0 1px var(--lime)}

  /* month grid */
  .mo{display:grid;grid-template-columns:repeat(7,1fr)}
  .mo .dh{padding:8px;text-align:center;font-size:11px;font-weight:700;color:var(--muted);border-bottom:1px solid var(--line);border-left:1px solid var(--line)}
  .mo .dh:nth-child(7n+1){border-left:0}
  .mo .dc{min-height:92px;border-left:1px solid var(--line);border-bottom:1px solid var(--line);padding:6px;font-size:12px}
  .mo .dc:nth-child(7n+1){border-left:0}
  .mo .dc .dn{font-weight:800;font-size:12px;color:var(--muted);margin-bottom:4px;font-variant-numeric:tabular-nums}
  .mo .dc.oth{background:rgba(255,255,255,.012)}
  .mo .dc.oth .dn{color:var(--faint)}
  .mo .dc.today .dn{color:var(--lime)}
  .mo .pill{display:block;background:var(--booked);color:var(--booked-ink);border-radius:6px;padding:2px 6px;font-size:10px;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mo .pill.tinted{background:var(--c);color:var(--ci);border:1px solid var(--cb)}
  .mo .pill.mine{background:var(--mine);color:#0d0f0e}
  .mo .more{font-size:10px;color:var(--muted)}

  /* week-open admin list */
  .weekopen{margin-top:18px}
  .weekopen h3{font-size:14px;margin:0 0 10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  .wo-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:var(--surface);margin-bottom:8px;flex-wrap:wrap}
  .wo-row .wk-name{font-weight:800;font-size:14px;min-width:150px}
  .wo-row .st{font-size:12px;font-weight:700;padding:3px 9px;border-radius:999px}
  .st.openg{background:var(--lime);color:#0d0f0e}
  .st.scheduled{background:rgba(54,192,138,.12);color:var(--ok);border:1px solid rgba(54,192,138,.4)}
  .st.closedg{background:var(--surface2);color:var(--muted);border:1px solid var(--line2)}
  .wo-row .spacer{flex:1}
  .wo-row .mini{border:1px solid var(--line2);background:var(--surface2);color:var(--ink);border-radius:8px;padding:7px 13px;font-size:12px;font-weight:700;transition:.18s}
  .wo-row .mini:hover{border-color:var(--faint)}
  .wo-row input[type=datetime-local]{border:1px solid var(--line2);border-radius:8px;padding:7px 9px;font-size:12px;background:var(--bg);color:var(--ink);color-scheme:dark}

  /* ---------- modal ---------- */
  .ov{position:fixed;inset:0;background:rgba(6,8,7,.66);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
  .ov.show{display:flex}
  .modal{background:var(--surface);border:1px solid var(--line2);border-radius:var(--r);max-width:430px;width:100%;padding:28px;box-shadow:var(--shadow);animation:pop .22s cubic-bezier(.2,.9,.3,1.2)}
  @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:none}}
  .modal h3{margin:0 0 4px;font-size:20px;font-family:var(--kr);font-weight:900;letter-spacing:-.3px}
  .modal .when{color:var(--lime);font-size:13px;margin-bottom:18px;font-weight:700;letter-spacing:.02em}
  .modal p{color:var(--muted)}
  .modal .row{display:flex;gap:10px;margin-top:22px}
  .modal .row .btn{flex:1}

  /* toast */
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);
    background:var(--lime);color:#0d0f0e;padding:13px 22px;border-radius:999px;font-size:14px;font-weight:800;
    opacity:0;pointer-events:none;transition:.25s;z-index:200;box-shadow:0 10px 30px rgba(0,0,0,.4)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.bad{background:var(--warn);color:#1a0a06}

  /* ---------- member sessions (admin table) ---------- */
  .f-sess{flex:0 0 96px;min-width:96px}
  .tablewrap{overflow-x:auto}
  .m-name{font-weight:700}
  .m-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:8px;vertical-align:0;box-shadow:0 0 0 2px rgba(255,255,255,.06)}
  .sess{display:inline-flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--line2);border-radius:999px;padding:4px 6px}
  .sess .stp{width:30px;height:30px;border-radius:50%;border:0;background:var(--surface2);color:var(--ink);font-size:18px;font-weight:800;line-height:1;display:flex;align-items:center;justify-content:center;transition:.15s}
  .sess .stp:hover{background:var(--lime);color:#0d0f0e}
  .sess .stp:disabled{opacity:.35;cursor:not-allowed}
  .sess .stp:disabled:hover{background:var(--surface2);color:var(--ink)}
  .sess .sval{min-width:26px;text-align:center;font-weight:800;font-size:16px;font-variant-numeric:tabular-nums}
  .sess .sval.zero{color:var(--warn)}

  /* ---------- user hero ---------- */
  .hero{background:linear-gradient(160deg,var(--surface2),var(--surface));border:1px solid var(--line2);border-radius:var(--r);padding:20px;margin-bottom:14px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(198,242,74,.16),transparent 70%)}
  .hero-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;position:relative;z-index:1}
  .hero-top .hi{font-family:var(--kr);font-size:17px;font-weight:500;color:var(--muted)}
  .hero-top .hi b{color:var(--ink);font-weight:900}
  .hero-logout{border:1px solid var(--line2);background:var(--surface);color:var(--muted);border-radius:999px;padding:7px 14px;font-size:12px;font-weight:700}
  .hero-logout:hover{color:var(--ink)}
  .hero-stats{display:grid;grid-template-columns:1.3fr 1fr;gap:10px;position:relative;z-index:1}
  .stat{background:rgba(0,0,0,.18);border:1px solid var(--line);border-radius:13px;padding:14px 16px;display:flex;flex-direction:column;gap:3px}
  .stat .lab{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
  .stat .num{font-family:var(--disp);font-size:30px;font-weight:800;line-height:1;color:var(--ink)}
  .stat .num small{font-size:13px;font-weight:700;color:var(--muted);margin-left:3px}
  .stat .next{font-size:16px;font-weight:800;color:var(--lime);margin-top:2px}
  .stat.big{grid-row:span 2;justify-content:center;align-items:flex-start}
  .stat.big .num{font-size:48px;color:var(--lime)}
  .stat.big.low .num{color:var(--warn)}
  .stat.wide{grid-column:2}
  .stat .warn-tag{margin-top:6px;font-size:11px;font-weight:800;color:var(--warn);background:rgba(255,106,77,.12);border:1px solid rgba(255,106,77,.4);padding:3px 8px;border-radius:999px;align-self:flex-start}
  .user-rules{font-size:12.5px;color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:11px 14px;margin-bottom:16px}
  .user-rules b{color:var(--lime)}

  /* ============ RESPONSIVE: 회원=모바일 / 관리자=태블릿 ============ */
  /* 관리자(태블릿) 본문 폭 넓게 */
  body.admin .wrap{max-width:1180px}
  body.admin .wk{min-width:760px}

  /* 태블릿(아이패드) */
  @media(min-width:700px) and (max-width:1100px){
    body.admin .wrap{padding:26px 28px 90px}
    body.admin .tabs button{padding:11px 22px;font-size:14px}
    body.admin .wk-time,body.admin .wk-head div{font-size:13px}
  }

  /* 모바일(회원 폰) */
  @media(max-width:560px){
    .brand .sub{display:none}
    .wrap{padding:16px 14px 60px}
    .calbar .label{min-width:auto;flex:1;font-size:15px}
    .calbar{gap:8px}

    /* 회원: 월 뷰 숨기고 주 뷰 중심, 가로 스크롤 최소화 */
    body.user .seg{display:none}           /* 모바일 회원은 주간만 */
    body.user .wk{min-width:0}
    body.user .wk-head{grid-template-columns:34px repeat(7,1fr)}
    body.user .wk-row{grid-template-columns:34px repeat(7,1fr)}
    body.user .wk-time{font-size:9px;padding:4px 2px}
    body.user .wk-head div{padding:7px 2px;font-size:10px}
    body.user .wk-head div b{display:block;font-size:13px}
    body.user .cell{min-height:40px;padding:2px}
    body.user .slot{font-size:9px;inset:2px;border-radius:6px}
    body.user .slot small{font-size:8px}
    body.user .slot.open{font-size:0}      /* '예약' 글자 대신 점만 */
    body.user .slot.open::after{content:"";width:5px;height:5px;border-radius:50%;background:var(--faint)}
    body.user .slot.open:hover::after{background:var(--lime)}

    .hero-stats{grid-template-columns:1fr 1fr}
    .stat.big{grid-row:span 2}
    .stat.big .num{font-size:42px}
    .modal{padding:22px}
    .toast{left:14px;right:14px;transform:translateY(20px);text-align:center;bottom:18px}
    .toast.show{transform:translateY(0)}
  }
  @media(max-width:380px){
    body.user .hero-stats{grid-template-columns:1fr 1fr}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="mk">YUR<b>I</b>ZM</span>
    <span class="sub">Yuri Kim · Personal Training</span>
  </div>
  <div class="roleswitch" id="roleswitch" style="display:none">
    <button data-role="admin" class="on">트레이너</button>
    <button data-role="user">회원</button>
  </div>
</div>

<div class="wrap" id="app"></div>

<!-- modal -->
<div class="ov" id="ov">
  <div class="modal" id="modal"></div>
</div>

/* ★★★ 여기 두 줄만 본인 Supabase 프로젝트 값으로 바꾸세요 ★★★
   Supabase 대시보드 > Project Settings > API 에서 확인:
   - Project URL
   - anon public key                                            */
const SUPABASE_URL  = "https://eskwqvvgqtizpdrerpuj.supabase.co";

/* ---------- state ---------- */
const KST = () => new Date();

/* ---------- helpers ---------- */
function id(){ return Math.random().toString(36).slice(2,9); } // (임시 키 용도만)
function pad(n){ return String(n).padStart(2,"0"); }
function ymd(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function slotKey(d,h){ return `${ymd(d)}-${pad(h)}`; }
/* slotKey("YYYY-MM-DD-HH") <-> Date 변환 (DB는 timestamptz) */
function keyToDate(key){ const [y,mo,da,h]=key.split("-").map(Number); return new Date(y,mo-1,da,h,0,0,0); }
function dateToKey(d){ const x=new Date(d); return `${ymd(x)}-${pad(x.getHours())}`; }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function addHours(d,n){ const x=new Date(d); x.setHours(x.getHours()+n); return x; }
function startOfWeek(d){ const x=new Date(d); const day=(x.getDay()+6)%7; x.setDate(x.getDate()-day); x.setHours(0,0,0,0); return x; }
function startOfMonth(d){ return new Date(d.getFullYear(), d.getMonth(), 1); }
function sameDay(a,b){ return ymd(a)===ymd(b); }
function isoWeekNum(d){
  const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day=(t.getUTCDay()+6)%7; t.setUTCDate(t.getUTCDate()-day+3);
  const first=new Date(Date.UTC(t.getUTCFullYear(),0,4));
  return 1+Math.round(((t-first)/86400000-3+((first.getUTCDay()+6)%7))/7);
}
function weekKey(monday){ return `${monday.getFullYear()}-W${pad(isoWeekNum(monday))}`; }
function weekLabel(monday){
  const m=monday.getMonth()+1;
  const weekOfMonth=Math.ceil(monday.getDate()/7);
  return `${m}월 ${weekOfMonth}주차`;
}
function nextMonday8am(monday){ const x=new Date(monday); x.setHours(8,0,0,0); return x; }
function fmtDateTime(d){
  if(!d) return "-";
  return `${d.getMonth()+1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function dtLocalValue(d){
  if(!d) return "";
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
const DAYS=["월","화","수","목","금","토","일"];
const HOURS=[]; for(let h=10;h<=22;h++) HOURS.push(h); // 10:00 ~ 22:00

function memberById(mid){ return state.members.find(m=>m.id===mid); }
function memberByPhone(p){ return state.members.find(m=>m.phone.replace(/\D/g,"")===p.replace(/\D/g,"")); }

/* =========================================================
   DATA LAYER (Supabase)
   ========================================================= */
async function loadAll(){
  const [mRes, sRes, wRes, bRes] = await Promise.all([
    sb.from("members").select("*").order("created_at",{ascending:true}),
    sb.from("schedules").select("*"),
    sb.from("week_settings").select("*"),
    sb.from("blocks").select("*"),
  ]);
  if(mRes.error||sRes.error||wRes.error||bRes.error){
    console.error(mRes.error||sRes.error||wRes.error||bRes.error);
    toast("데이터를 불러오지 못했어요. 설정을 확인하세요.",true);
    return false;
  }
  state.members = (mRes.data||[]).map(r=>({id:r.id,name:r.name,phone:r.phone,sessions:r.sessions}));
  state.schedules = {};
  (sRes.data||[]).forEach(r=>{
    state.schedules[dateToKey(new Date(r.slot_at))] = {memberId:r.member_id, createdBy:r.created_by};
  });
  state.weeks = {};
  (wRes.data||[]).forEach(r=>{
    state.weeks[r.week_key] = {mode:r.mode, openAt: r.open_at?new Date(r.open_at):null};
  });
  // blocks: dayKey set + slotKey set
  state.blockDays = new Set();
  state.blockSlots = new Set();
  state.blockList = (bRes.data||[]).map(r=>({id:r.id,kind:r.kind,at:new Date(r.block_at),reason:r.reason}));
  state.blockList.forEach(b=>{
    if(b.kind==="day") state.blockDays.add(ymd(b.at));
    else state.blockSlots.add(dateToKey(b.at));
  });
  state.loading = false;
  return true;
}

/* 실시간 구독: 다른 기기에서의 변경을 즉시 반영 */
function subscribeRealtime(){
  sb.channel("yurizm")
    .on("postgres_changes",{event:"*",schema:"public",table:"schedules"}, reloadSoft)
    .on("postgres_changes",{event:"*",schema:"public",table:"members"}, reloadSoft)
    .on("postgres_changes",{event:"*",schema:"public",table:"week_settings"}, reloadSoft)
    .on("postgres_changes",{event:"*",schema:"public",table:"blocks"}, reloadSoft)
    .subscribe();
}
let reloadTimer;
function reloadSoft(){
  clearTimeout(reloadTimer);
  reloadTimer = setTimeout(async ()=>{ await loadAll(); if(state.authed) render(); }, 250);
}

/* RPC 헬퍼 */
async function rpc(fn, args){
  const {data,error} = await sb.rpc(fn, args);
  if(error){ console.error(fn,error); return {ok:false, reason:"error"}; }
  return data;
}
const REASON = {
  no_member:"회원 정보를 찾을 수 없어요.",
  too_late:"예약 가능 시간이 아닙니다.",

  not_owner:"본인 예약만 취소할 수 있어요.",
  dup_phone:"이미 등록된 번호예요.",
  blocked:"트레이너가 막아둔 시간이에요.",
  dup:"이미 등록된 항목이에요.",
  wrong_pin:"현재 비밀번호가 올바르지 않아요.",
  too_short:"새 비밀번호는 4자 이상이어야 해요.",
  error:"처리 중 오류가 발생했어요.",
};

/* 회원별 고정 색상: 등록 순서를 황금각으로 분배 (다크 테마용) */
function hashStr(s){ let h=0; for(let i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))>>>0; } return h; }
function memberColor(mid){
  const idx=state.members.findIndex(m=>m.id===mid);
  const i = idx<0 ? hashStr(mid)%997 : idx;
  const hue=(i*137.508)%360;                  // 순서대로 황금각 → 인접 회원도 색이 멀어짐
  const tier=Math.floor(i/12)%3;              // 12명마다 명도 계단으로 추가 분리
  const sat=64 - tier*6;                       // 64 / 58 / 52
  const light=62 - tier*5;                     // 62 / 57 / 52
  const bg=`hsl(${hue.toFixed(1)} ${sat}% ${light}%)`;
  const border=`hsl(${hue.toFixed(1)} ${sat}% ${(light-15)}%)`;
  const ink="#11140f";
  return {bg,border,ink,hue};
}

/* week status resolution (auto-open by time) */
function weekStatus(monday){
  const k=weekKey(monday);
  const w=state.weeks[k];
  if(!w) return {mode:"closed", openAt:null};
  if(w.mode==="scheduled" && w.openAt && now>=w.openAt){
    return {mode:"open", openAt:w.openAt}; // time reached -> effectively open
  }
  return w;
}

function weeksPanel(){
  // show this week + next 5 weeks
  let rows="";
  for(let i=0;i<6;i++){
    const monday=addDays(startOfWeek(now),i*7);

      badge=`<span class="st openg">오픈됨</span>`;
      ctrl=`<button class="mini" data-close="${k}">닫기</button>`;
    } else if(w.mode==="scheduled"){
      badge=`<span class="st scheduled">예약 오픈 ${fmtDateTime(w.openAt)}</span>`;

    } else {
      badge=`<span class="st closedg">닫힘</span>`;
      ctrl=`
        <input type="datetime-local" data-dt="${k}" value="${dtLocalValue(nextMonday8am(monday))}">
        <button class="mini" data-schedule="${k}">예약 오픈</button>
        <button class="mini" data-opennow="${k}">즉시 오픈</button>`;
    }
    rows+=`
      <div class="wo-row">
        <span class="wk-name">${weekLabel(monday)}</span>
        ${badge}
        <span class="spacer"></span>
        ${ctrl}
      </div>`;
  }
  return `
    <div class="panel-head"><h2>주차 오픈 관리</h2><span class="who">회원이 예약할 수 있는 주를 여기서 엽니다</span></div>

    </div>`;
}

/* 스냅샷 → 읽기전용 주간 표 (요일 x 시간) */
function snapshotTable(snap){
  const items=(snap.payload||[]).map(p=>({at:new Date(p.slot_at),name:p.name,by:p.created_by}));
  if(!items.length) return `<div class="empty">이 시점에 예약이 없었어요.</div>`;
  // 주 범위: 가장 이른 예약이 속한 주의 월요일부터 7일
  const minAt=items.reduce((a,b)=>a.at<b.at?a:b).at;
  const monday=startOfWeek(minAt);
  const map={};
  items.forEach(it=>{ map[dateToKey(it.at)]=it; });
  let head=`<div class="wk-head"><div></div>`;
  for(let i=0;i<7;i++){ const d=addDays(monday,i); head+=`<div>${DAYS[i]} <b>${d.getDate()}</b></div>`; }
  head+=`</div>`;
  let rows="";
  for(const h of HOURS){
    rows+=`<div class="wk-row"><div class="wk-time">${pad(h)}:00</div>`;
    for(let i=0;i<7;i++){
      const d=addDays(monday,i); const k=`${ymd(d)}-${pad(h)}`;
      const it=map[k];
      if(it){
        rows+=`<div class="cell"><div class="slot booked" style="position:absolute;inset:3px">${esc(it.name)}<small>${pad(h)}:00</small></div></div>`;
      } else {
        rows+=`<div class="cell"></div>`;
      }
    }
    rows+=`</div>`;
  }
  const t=new Date(snap.taken_at);
  return `<div class="snaplabel">📌 ${esc(snap.label||fmtDateTime(t))} 시점 · 수정 불가</div>
    <div class="gridwrap" id="snapGrid"><div class="wk">${head}${rows}</div></div>`;
}

/* =========================================================
   CALENDAR (shared by admin schedule + user)
   ========================================================= */
function schedulePanel(isAdmin){
  const modeSeg=`
    <div class="seg">
      <button data-cal="week" class="${state.calMode==='week'?'on':''}">주</button>
      <button data-cal="month" class="${state.calMode==='month'?'on':''}">월</button>
    </div>`;

  const label = state.calMode==="week"
    ? `${weekLabel(state.cursor)} · ${state.cursor.getMonth()+1}/${state.cursor.getDate()}~`
    : `${state.cursor.getFullYear()}년 ${state.cursor.getMonth()+1}월`;

  const bar=`
    <div class="calbar">
      <div class="nav">
        <button data-move="-1">‹</button>
        <button data-move="0">오늘</button>
        <button data-move="1">›</button>
      </div>
      <div class="label">${label}</div>
      <div class="spacer"></div>
      ${modeSeg}
    </div>`;

  const legend=`
    <div class="legend">
      <span><i style="background:var(--surface);border:1px dashed var(--line)"></i>예약 가능</span>
      <span><i style="background:var(--booked)"></i>예약됨</span>
      ${!isAdmin?`<span><i style="background:var(--mine)"></i>내 예약</span>`:``}
      <span><i style="background:#e3e0d4"></i>닫힘</span>
    </div>`;

  const grid = state.calMode==="week" ? weekGrid(isAdmin) : monthGrid(isAdmin);
  return bar+legend+`<div class="gridwrap">${grid}</div>`;
}

function weekGrid(isAdmin){
  const monday=startOfWeek(state.cursor);
  let head=`<div class="wk-head"><div></div>`;
  for(let i=0;i<7;i++){
    const d=addDays(monday,i);
    const isToday=sameDay(d,now);
    head+=`<div class="${isToday?'today':''}">${DAYS[i]} <b>${d.getDate()}</b></div>`;
  }
  head+=`</div>`;

  let rows="";
  for(const h of HOURS){
    rows+=`<div class="wk-row"><div class="wk-time">${pad(h)}:00</div>`;
    for(let i=0;i<7;i++){
      const d=addDays(monday,i);
      rows+=`<div class="cell" data-cell="${slotKey(d,h)}">${slotHTML(d,h,isAdmin)}</div>`;
    }
    rows+=`</div>`;
  }
  return `<div class="wk">${head}${rows}</div>`;
}

function monthGrid(isAdmin){
  const first=startOfMonth(state.cursor);
  const gridStart=startOfWeek(first);
  let html=`<div class="mo">`;
  for(const d of DAYS) html+=`<div class="dh">${d}</div>`;
  for(let i=0;i<42;i++){
    const d=addDays(gridStart,i);
    const oth=d.getMonth()!==state.cursor.getMonth();
    const isToday=sameDay(d,now);
    // bookings that day
    const items=[];
    for(const h of HOURS){
      const s=state.schedules[slotKey(d,h)];
      if(s){
        const m=memberById(s.memberId);
        const mine=!isAdmin && m && m.phone===state.currentUserPhone;
        let cls="", style="";
        if(isAdmin && m){ const c=memberColor(m.id); cls="tinted"; style=`style="--c:${c.bg};--cb:${c.border};--ci:${c.ci||c.ink}"`; }
        else if(mine){ cls="mine"; }
        let label;
        if(isAdmin) label = esc(m?m.name:'');
        else if(mine) label = esc(m?m.name:'');
        else label = "예약됨";
        items.push(`<span class="pill ${cls}" ${style}>${pad(h)}:00 ${label}</span>`);
      }
    }
    const shown=items.slice(0,3).join("");
    const more=items.length>3?`<span class="more">+${items.length-3}건</span>`:"";
    html+=`<div class="dc ${oth?'oth':''} ${isToday?'today':''}" data-day="${ymd(d)}">
      <div class="dn">${d.getDate()}</div>${shown}${more}</div>`;
  }
  html+=`</div>`;
  return html;
}

function slotHTML(d,h,isAdmin){
  const key=slotKey(d,h);
  const slotDate=new Date(d); slotDate.setHours(h,0,0,0);
  const s=state.schedules[key];
  const monday=startOfWeek(d);
  const wst=weekStatus(monday);
  const isPast = slotDate < now;

  if(s){
    const m=memberById(s.memberId);
    const mine = !isAdmin && m && m.phone===state.currentUserPhone;
    const completed = slotDate < now; // 완료된(지난) 스케줄은 드래그 불가
    const draggable = isAdmin && !completed;
    let cls="booked", styleAttr="";
    if(isAdmin && m){
      // 트레이너 화면: 회원마다 고정 색상
      const c=memberColor(m.id);
      cls="tinted";
      styleAttr=`style="--c:${c.bg};--cb:${c.border};--ci:${c.ink}"`;
    } else if(mine){
      cls="mine";
    }
    // 라벨: 트레이너는 모두 / 회원은 본인 것만 이름, 남의 것은 '예약됨'
    let label;
    if(isAdmin) label = esc(m?m.name:'?');
    else if(mine) label = esc(m?m.name:'') ;
    else label = "예약됨";
    return `<div class="slot ${cls} ${isPast?'past':''}" ${styleAttr}
        ${draggable?`draggable="true" data-drag="${key}"`:""}
        data-slot="${key}" data-booked="1">
        <span>${label}</span><small>${pad(h)}:00${completed?' ✓':''}</small>
      </div>`;
  }

  // 블록 여부 (휴일=그날 전체 / 슬롯=해당시각)
  const isDayBlock = state.blockDays && state.blockDays.has(ymd(d));
  const isSlotBlock = state.blockSlots && state.blockSlots.has(key);
  const blocked = isDayBlock || isSlotBlock;

  // empty slot
  if(isAdmin){
    if(blocked){
      return `<div class="slot blocked" data-slot="${key}" data-blocked="1" title="${isDayBlock?'휴일':'차단된 시간'} · 탭하여 해제">${isDayBlock?'휴일':'차단'}</div>`;
    }
    return `<div class="slot open" data-slot="${key}" data-empty="1">+</div>`;
  } else {
    if(blocked) return `<div class="slot closed" title="예약 불가">${isDayBlock?'휴무':'–'}</div>`;
    if(wst.mode!=="open") return `<div class="slot closed">닫힘</div>`;
    const ahead = slotDate >= addHours(now,12);
    if(!ahead) return `<div class="slot closed" title="예약 가능 시간이 아닙니다">–</div>`;
    return `<div class="slot open" data-slot="${key}" data-empty="1">예약</div>`;
  }
}

/* =========================================================
   BIND: calendar nav + slot interactions
   ========================================================= */
function bindCalendarNav(isAdmin){
  document.querySelectorAll("[data-cal]").forEach(b=>{
    b.onclick=()=>{ state.calMode=b.dataset.cal; render(); };
  });
  document.querySelectorAll("[data-move]").forEach(b=>{
    b.onclick=()=>{
      const dir=parseInt(b.dataset.move,10);
      if(dir===0){ state.cursor = state.calMode==="week"?startOfWeek(now):startOfMonth(now); }
      else if(state.calMode==="week"){ state.cursor=addDays(state.cursor,7*dir); }
      else { state.cursor=new Date(state.cursor.getFullYear(),state.cursor.getMonth()+dir,1); }
      render();
    };
  });

  // month day -> jump to that week
  document.querySelectorAll("[data-day]").forEach(c=>{
    c.onclick=()=>{
      const [y,m,d]=c.dataset.day.split("-").map(Number);
      state.cursor=startOfWeek(new Date(y,m-1,d)); state.calMode="week"; render();
    };
  });

  // slot clicks
  document.querySelectorAll("[data-slot]").forEach(el=>{
    el.onclick=()=>{
      if(el.dataset.empty) onEmptyClick(el.dataset.slot, isAdmin);
      else if(el.dataset.booked) onBookedClick(el.dataset.slot, isAdmin);
      else if(el.dataset.blocked && isAdmin) onBlockedClick(el.dataset.slot);
    };
  });

  if(isAdmin) enableDnd();
}

function parseKey(key){
  // YYYY-MM-DD-HH
  const [y,mo,da,h]=key.split("-").map(Number);
  const d=new Date(y,mo-1,da); const dt=new Date(y,mo-1,da,h,0,0,0);
  return {d,h,dt};
}

/* ---- empty slot click ---- */

  if(isAdmin){
    if(!state.members.length){ toast("먼저 회원을 등록하세요.",true); return; }
    const opts=state.members.map(m=>`<option value="${m.id}">${esc(m.name)} · 잔여 ${m.sessions}회</option>`).join("");
    openModal(`
      <h3>스케줄 등록</h3>
      <div class="when">${fmtDateTime(dt)}</div>
      <div class="field"><label>회원 선택</label><select id="selM">${opts}</select></div>
      <p style="font-size:13px;margin:0">등록하면 해당 회원의 잔여 횟수에서 1회가 차감됩니다.</p>
      <div class="row">
        <button class="btn ghost" onclick="closeModal()">취소</button>
        <button class="btn" id="confBook">등록</button>
      </div>
      <div class="row" style="margin-top:8px">
        <button class="btn ghost" id="blockSlot" style="font-size:13px">이 시간 차단(예약 불가)</button>
      </div>`);
    document.getElementById("blockSlot").onclick=async ()=>{
      const r=await rpc("admin_add_block",{p_kind:"slot",p_at:dt.toISOString(),p_reason:null});
      if(!r.ok){ toast(REASON[r.reason]||"차단 실패",true); }
      await loadAll(); closeModal(); toast("이 시간을 차단했어요."); render();
    };
    document.getElementById("confBook").onclick=async ()=>{
      const mid=document.getElementById("selM").value;
      const r=await rpc("book_slot",{p_member_id:mid,p_slot_at:dt.toISOString(),p_by:"admin"});
      if(!r.ok){ toast(REASON[r.reason]||"등록 실패",true); closeModal(); await loadAll(); render(); return; }
      const mem=memberById(mid);
      await loadAll(); closeModal(); toast("스케줄을 등록했어요. ("+esc(mem?mem.name:'')+" 잔여 "+r.sessions_left+"회)"); render();
    };
  } else {
    const m=memberByPhone(state.currentUserPhone);
    const monday=startOfWeek(dt);
    if(weekStatus(monday).mode!=="open"){ toast("아직 열리지 않은 주예요.",true); return; }
    if(dt < addHours(now,12)){ toast("예약 가능 시간이 아닙니다. 예약은 수업 12시간 전까지 가능해요.",true); return; }
    if(state.schedules[key]){ toast("방금 다른 분이 잡았어요.",true); render(); return; }
    if(m.sessions<=0){ toast("잔여 PT 횟수가 없어요. 트레이너에게 문의하세요.",true); return; }
    openModal(`
      <h3>PT 예약</h3>
      <div class="when">${fmtDateTime(dt)}</div>
      <p style="font-size:14px;margin:0">${esc(m.name)}님 이름으로 이 시간을 잡습니다. 예약하면 잔여 횟수 ${m.sessions}회 중 1회가 차감돼요.</p>
      <div class="row">
        <button class="btn ghost" onclick="closeModal()">취소</button>
        <button class="btn accent" id="confBook">예약 확정</button>
      </div>`);
    document.getElementById("confBook").onclick=async ()=>{
      const r=await rpc("book_slot",{p_member_id:m.id,p_slot_at:dt.toISOString(),p_by:"user"});
      if(!r.ok){ toast(REASON[r.reason]||"예약 실패",true); closeModal(); await loadAll(); render(); return; }
      await loadAll(); closeModal(); toast("예약 완료! 잔여 "+r.sessions_left+"회"); render();
    };
  }
}

/* ---- blocked slot click (admin: 해제) ---- */
function onBlockedClick(key){
  const {dt}=parseKey(key);
  const dayKey=ymd(dt);
  const isDay = state.blockDays.has(dayKey);
  const block = isDay
    ? state.blockList.find(b=>b.kind==="day" && ymd(b.at)===dayKey)
    : state.blockList.find(b=>b.kind==="slot" && dateToKey(b.at)===key);
  openModal(`
    <h3>${isDay?'휴일 해제':'차단 해제'}</h3>
    <div class="when">${isDay?(dt.getMonth()+1)+'/'+dt.getDate()+' 하루 전체':fmtDateTime(dt)}</div>
    <p style="font-size:14px;margin:0">${isDay?'이 날의 휴일 설정을 해제할까요? 해제하면 회원이 다시 예약할 수 있어요.':'이 시간의 차단을 해제할까요?'}</p>
    <div class="row">
      <button class="btn ghost" onclick="closeModal()">닫기</button>
      <button class="btn" id="unblock">해제</button>
    </div>`);
  document.getElementById("unblock").onclick=async ()=>{
    if(block){ await rpc("admin_remove_block",{p_id:block.id}); }
    await loadAll(); closeModal(); toast("해제했어요."); render();
  };
}


function onBookedClick(key, isAdmin){
  const {dt}=parseKey(key);
  const s=state.schedules[key]; if(!s) return;
  const m=memberById(s.memberId);

  if(isAdmin){
    openModal(`
      <h3>예약 상세</h3>
      <div class="when">${fmtDateTime(dt)} · ${esc(m?m.name:'?')}</div>
      <p style="color:var(--muted);font-size:14px;margin:0">${dt<now?'완료된 스케줄입니다.':'미완료 스케줄은 캘린더에서 드래그로 옮길 수 있어요.'}</p>
      <div class="row">
        <button class="btn ghost" onclick="closeModal()">닫기</button>
        <button class="btn danger" id="confCancel">예약 삭제</button>
      </div>`);
    document.getElementById("confCancel").onclick=async ()=>{
      const r=await rpc("cancel_slot",{p_slot_at:dt.toISOString(),p_member_id:null,p_is_admin:true});
      await loadAll(); closeModal();
      toast(r.ok?"삭제했어요.":(REASON[r.reason]||"삭제 실패")); render();
    };
  } else {
    const mine = m && m.phone===state.currentUserPhone;
    if(!mine){ toast("다른 회원의 예약이에요.",true); return; }
    const canCancel = now <= addHours(dt,-12);
    openModal(`
      <h3>내 예약</h3>
      <div class="when">${fmtDateTime(dt)}</div>
      <p style="font-size:14px;margin:0">
        ${canCancel?'취소하면 잔여 횟수 1회가 복원됩니다. 취소는 수업 12시간 전까지 가능해요.':'취소 가능 시간이 아닙니다. 수업 12시간 전이 지나면 취소할 수 없어요.'}
      </p>
      <div class="row">
        <button class="btn ghost" onclick="closeModal()">닫기</button>
        ${canCancel?`<button class="btn danger" id="confCancel">예약 취소</button>`:``}
      </div>`);
    if(canCancel) document.getElementById("confCancel").onclick=async ()=>{
      const r=await rpc("cancel_slot",{p_slot_at:dt.toISOString(),p_member_id:m.id,p_is_admin:false});
      if(!r.ok){ toast(REASON[r.reason]||"취소 실패",true); closeModal(); await loadAll(); render(); return; }
      await loadAll(); closeModal(); toast("예약을 취소했어요."); render();
    };
  }
}

/* =========================================================
   DRAG & DROP (admin, incomplete only)
   ========================================================= */
let dragKey=null;
function enableDnd(){
  document.querySelectorAll("[data-drag]").forEach(el=>{
    el.addEventListener("dragstart",e=>{
      dragKey=el.dataset.drag; el.classList.add("dragging");
      e.dataTransfer.effectAllowed="move";
    });
    el.addEventListener("dragend",()=>{ el.classList.remove("dragging"); dragKey=null;
      document.querySelectorAll(".cell.dragover").forEach(c=>c.classList.remove("dragover")); });
  });
  document.querySelectorAll("[data-cell]").forEach(cell=>{
    cell.addEventListener("dragover",e=>{ if(dragKey){ e.preventDefault(); cell.classList.add("dragover"); } });
    cell.addEventListener("dragleave",()=>cell.classList.remove("dragover"));
    cell.addEventListener("drop",async e=>{
      e.preventDefault(); cell.classList.remove("dragover");
      const target=cell.dataset.cell;
      if(!dragKey||dragKey===target) return;
      if(state.schedules[target]){ toast("그 시간엔 이미 예약이 있어요.",true); return; }
      const {dt}=parseKey(target);
      if(dt<now){ toast("지난 시간으로는 옮길 수 없어요.",true); return; }
      const from=keyToDate(dragKey), to=keyToDate(target);
      const r=await rpc("move_slot",{p_from:from.toISOString(),p_to:to.toISOString()});
      if(!r.ok){ toast(REASON[r.reason]||"이동 실패",true); await loadAll(); render(); return; }
      await loadAll(); toast("스케줄을 옮겼어요."); render();
    });
  });
}

/* 스냅샷 표를 canvas로 그려 PNG 저장 (외부 라이브러리 없음) */
function downloadSnapshotPng(){
  const list=state.snapshots||[];
  const sel=state.viewSnapId || (list[0]&&list[0].id);
  const snap=list.find(s=>s.id===sel);
  if(!snap){ toast("백업이 없어요.",true); return; }
  const items=(snap.payload||[]).map(p=>({at:new Date(p.slot_at),name:p.name}));
  if(!items.length){ toast("이 시점에 예약이 없어요.",true); return; }
  const monday=startOfWeek(items.reduce((a,b)=>a.at<b.at?a:b).at);
  const map={}; items.forEach(it=>map[dateToKey(it.at)]=it);

  const colW=150, rowH=34, timeW=64, headH=70, padT=64;
  const W=timeW+colW*7, H=padT+headH+rowH*HOURS.length+20;
  const c=document.createElement("canvas");
  const scale=2; c.width=W*scale; c.height=H*scale;
  const x=c.getContext("2d"); x.scale(scale,scale);
  // bg
  x.fillStyle="#0d0f0e"; x.fillRect(0,0,W,H);
  // title
  x.fillStyle="#c6f24a"; x.font="bold 20px sans-serif";
  x.fillText("YURIZM  일정 백업", 16, 30);
  x.fillStyle="#8a948b"; x.font="13px sans-serif";
  x.fillText((snap.label||"")+"  시점 · 수정 불가", 16, 50);
  // head
  const oy=padT;
  x.fillStyle="#15191a"; x.fillRect(0,oy,W,headH-30);
  x.fillStyle="#eef2ec"; x.font="bold 13px sans-serif"; x.textAlign="center";
  for(let i=0;i<7;i++){ const d=addDays(monday,i);
    x.fillText(`${DAYS[i]} ${d.getMonth()+1}/${d.getDate()}`, timeW+colW*i+colW/2, oy+25);
  }
  // rows
  let ry=oy+headH-30;
  HOURS.forEach((h,ri)=>{
    x.fillStyle = ri%2? "#121514":"#0f1211"; x.fillRect(0,ry,W,rowH);
    x.fillStyle="#8a948b"; x.font="11px sans-serif"; x.textAlign="right";
    x.fillText(`${pad(h)}:00`, timeW-8, ry+rowH/2+4);
    for(let i=0;i<7;i++){ const d=addDays(monday,i); const it=map[`${ymd(d)}-${pad(h)}`];
      const cx=timeW+colW*i;
      if(it){
        x.fillStyle="#2f6f57"; roundRect(x,cx+4,ry+4,colW-8,rowH-8,6); x.fill();
        x.fillStyle="#d7f5e8"; x.font="bold 12px sans-serif"; x.textAlign="center";
        x.fillText(it.name, cx+colW/2, ry+rowH/2+4);
      }
    }
    ry+=rowH;
  });
  // grid lines
  x.strokeStyle="#2b332e"; x.lineWidth=1;
  for(let i=0;i<=7;i++){ x.beginPath(); x.moveTo(timeW+colW*i,oy); x.lineTo(timeW+colW*i,ry); x.stroke(); }

  c.toBlob(b=>{
    const url=URL.createObjectURL(b); const a=document.createElement("a");
    a.href=url; a.download=`yurizm_backup_${(snap.label||"").replace(/[^0-9]/g,"")}.png`;
    a.click(); URL.revokeObjectURL(url);
    toast("PNG로 저장했어요.");
  });
}
function roundRect(x,px,py,w,h,r){ x.beginPath(); x.moveTo(px+r,py); x.arcTo(px+w,py,px+w,py+h,r); x.arcTo(px+w,py+h,px,py+h,r); x.arcTo(px,py+h,px,py,r); x.arcTo(px,py,px+w,py,r); x.closePath(); }

/* ---------- util ---------- */
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
